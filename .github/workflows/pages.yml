name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "spec/**"
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Copy the static `web/` app into the Astro build output at
      # `/app/` so it ships under the same Pages domain as the
      # docs site (→ `https://<user>.github.io/openhost/app/`).
      # No JS build step — web/ is already HTML + JS + WASM.
      - name: Copy web/ into dist
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p site/dist/app
          cp -R web/. site/dist/app/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
