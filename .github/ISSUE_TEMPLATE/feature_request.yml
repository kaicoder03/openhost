name: Feature request
description: Suggest a change to the protocol, the daemon, the client, or a tool.
title: "[feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Changes to the protocol itself are higher-stakes than changes to an implementation. If your request touches `spec/`, please summarize the compatibility implications up front.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing problem, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: true
      options:
        - Protocol / spec change
        - Daemon
        - Client library
        - Browser extension
        - macOS or iOS app
        - Website / docs
        - Tooling / CI
    validations:
      required: true
